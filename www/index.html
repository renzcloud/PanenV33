    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body {
            background: #010101; /* Warna hitam pekat */
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* BACKGROUND GAMBAR HIU GAHAR (BIAR ENTENG DI HP) */
        .shark-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://w0.peakpx.com/wallpaper/473/938/HD-wallpaper-great-white-shark-great-white-ocean-sharks-sea.jpg'); /* Gambar Hiu Gahar */
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            opacity: 0.2; /* Samar-samar keren */
            z-index: -2;
            filter: blur(2px);
        }

        /* EFEK CAHAYA BIRU GELAP DI BACKGROUND */
        .glow-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0, 163, 255, 0.1) 0%, rgba(1, 1, 1, 0.9) 70%);
            z-index: -1;
        }

        .container {
            background: rgba(13, 17, 23, 0.85); /* Transparan gelap pekat */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 163, 255, 0.5); /* Glow biru-biru kuat */
            text-align: center;
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(0, 163, 255, 0.3);
            animation: glowIn 1.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        /* HIASAN GIGI HIU DI POJOK (CSS TRICK) */
        .container::before {
            content: "🦈";
            position: absolute;
            top: -20px; right: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(30deg);
        }

        @keyframes glowIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-tiktok {
            width: 70px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        h1 { font-size: 28px; color: #fe2c55; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px rgba(254, 44, 85, 0.7); }
        p { font-size: 15px; color: #8b949e; margin-bottom: 30px; }

        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 8px; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(1, 1, 1, 0.9);
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #e6edf3;
            font-size: 15px;
            transition: all 0.3s;
            border: 1px solid rgba(0, 163, 255, 0.2);
        }
        .input-group input:focus {
            border-color: #00a3ff;
            box-shadow: 0 0 15px rgba(0, 163, 255, 0.3);
            outline: none;
            background: rgba(13, 17, 23, 1);
        }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #001a33, #003366, #004080); /* Gradasi Biru Laut Dalam */
            color: #fff;
            border: 1px solid rgba(0, 163, 255, 0.5);
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        /* EFEK KILATAN DI TOMBOL */
        .btn-generate::before {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: all 0.6s;
        }
        .btn-generate:hover::before {
            left: 100%;
        }

        .btn-generate:hover {
            background: linear-gradient(45deg, #fe2c55, #ff6b81, #fe2c55); /* Ganti merah-pink pas hover */
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(254, 44, 85, 0.7);
            border: 1px solid rgba(254, 44, 85, 0.5);
        }

        .footer { margin-top: 30px; font-size: 11px; color: #6e7681; position: relative; z-index: 1; }
        .footer a { color: #00a3ff; text-decoration: none; font-weight: bold; }
        
        /* EFEK GELEMBUNG UDARA (CSS) */
        .bubble {
            position: absolute;
            bottom: -50px;
            background-color: rgba(0, 163, 255, 0.2);
            border-radius: 50%;
            animation: bubbleUp 10s infinite;
            z-index: -1;
        }
        @keyframes bubbleUp {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.5; }
            50% { opacity: 0.1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
